[aava-outbound-amd]
exten => s,1,NoOp(AAVA outbound AMD return context)
 same => n,ExecIf($["${AAVA_AMD_OPTS}"=""]?AMD():AMD(${AAVA_AMD_OPTS}))
 same => n,NoOp(AAVA AMD result status=${AMDSTATUS} cause=${AMDCAUSE} attempt=${AAVA_ATTEMPT_ID})
 same => n,Stasis(asterisk-ai-voice-agent,outbound_amd,${AAVA_ATTEMPT_ID},${AMDSTATUS},${AMDCAUSE},,)
 same => n,Hangup()
