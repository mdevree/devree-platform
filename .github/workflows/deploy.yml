name: Build & Push naar GHCR

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    steps:
      # 1. Code ophalen
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Docker Buildx setup (voor caching)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. Inloggen bij GitHub Container Registry
      - name: Login bij GHCR
        shell: bash
        run: |
          for attempt in 1 2 3; do
            if echo "${{ secrets.GITHUB_TOKEN }}" | docker login "${{ env.REGISTRY }}" -u "${{ github.actor }}" --password-stdin; then
              exit 0
            fi
            echo "GHCR login mislukt, poging ${attempt}/3. Opnieuw proberen..."
            sleep $((attempt * 10))
          done
          exit 1

      # 4. Image metadata (tags + labels)
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=

      # 5. Docker image bouwen en pushen
      - name: Build en push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          provenance: false
          sbom: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max,ignore-error=true

      # 6. Productie automatisch bijwerken als de deploy key als secret is ingesteld
      - name: Deploy naar productie
        shell: bash
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEVREE_DEPLOY_SSH_KEY }}
        run: |
          if [ -z "${DEPLOY_SSH_KEY}" ]; then
            echo "DEVREE_DEPLOY_SSH_KEY ontbreekt; image is gepusht maar productie is niet bijgewerkt."
            exit 0
          fi

          install -m 700 -d ~/.ssh
          printf '%s\n' "${DEPLOY_SSH_KEY}" > ~/.ssh/devree_deploy_key
          chmod 600 ~/.ssh/devree_deploy_key

          cat > ~/.ssh/known_hosts <<'EOF'
          136.144.253.219 ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAINhFdBDekKfME88LavZowIReZKzzpWf+0Oepz/Qymlmi
          EOF

          DEPLOY_TAG="${GITHUB_SHA::7}"
          ssh -i ~/.ssh/devree_deploy_key root@136.144.253.219 \
            "/usr/local/sbin/deploy-devree-platform ${DEPLOY_TAG}"
