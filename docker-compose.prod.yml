# Productie configuratie voor Portainer
# Gebruikt image van GHCR in plaats van lokale build
services:
  devree-platform:
    image: ghcr.io/mdevree/devree-platform:latest
    container_name: devree-platform
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL}
      - AUTH_TRUST_HOST=true
      - MAUTIC_URL=${MAUTIC_URL}
      - MAUTIC_CLIENT_ID=${MAUTIC_CLIENT_ID}
      - MAUTIC_CLIENT_SECRET=${MAUTIC_CLIENT_SECRET}
      - N8N_URL=${N8N_URL}
      - N8N_WEBHOOK_SECRET=${N8N_WEBHOOK_SECRET}
      - EVOLUTION_API_URL=${EVOLUTION_API_URL}
      - EVOLUTION_API_KEY=${EVOLUTION_API_KEY}
      - EVOLUTION_INSTANCE=${EVOLUTION_INSTANCE}
      - EVOLUTION_WEBHOOK_SECRET=${EVOLUTION_WEBHOOK_SECRET}
      - WHATSAPP_PROVIDER=${WHATSAPP_PROVIDER}
      - WHATSAPP_WEBHOOK_SECRET=${WHATSAPP_WEBHOOK_SECRET}
      - WAHA_API_URL=${WAHA_API_URL}
      - WAHA_API_KEY=${WAHA_API_KEY}
      - WAHA_SESSION=${WAHA_SESSION}
      - N8N_WEBHOOK_WHATSAPP_SUMMARY_URL=${N8N_WEBHOOK_WHATSAPP_SUMMARY_URL}
      - NEXT_PUBLIC_MAUTIC_URL=${NEXT_PUBLIC_MAUTIC_URL}
      - NEXT_PUBLIC_DEBITEUREN_URL=${NEXT_PUBLIC_DEBITEUREN_URL}
      - PORT=3100
    restart: unless-stopped
    network_mode: host
