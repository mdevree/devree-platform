services:
  devree-platform:
    build: .
    ports:
      - "3100:3000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL}
      - MAUTIC_URL=${MAUTIC_URL}
      - MAUTIC_CLIENT_ID=${MAUTIC_CLIENT_ID}
      - MAUTIC_CLIENT_SECRET=${MAUTIC_CLIENT_SECRET}
      - N8N_WEBHOOK_SECRET=${N8N_WEBHOOK_SECRET}
      - NEXT_PUBLIC_MAUTIC_URL=${MAUTIC_URL}
      - NEXT_PUBLIC_DEBITEUREN_URL=${DEBITEUREN_URL}
      - DOCUMENSO_URL=${DOCUMENSO_URL}
      - DOCUMENSO_API_URL=${DOCUMENSO_API_URL}
      - DOCUMENSO_API_TOKEN=${DOCUMENSO_API_TOKEN}
      - DOCUMENSO_ATTACHMENT_PUBLIC_BASE_URL=${DOCUMENSO_ATTACHMENT_PUBLIC_BASE_URL}
      - DOCUMENSO_REDIRECT_URL=${DOCUMENSO_REDIRECT_URL}
      - PROPOSAL_PUBLIC_BASE_URL=${PROPOSAL_PUBLIC_BASE_URL}
      - PLATFORM_INTERNAL_URL=${PLATFORM_INTERNAL_URL}
      - DOCUMENSO_OTD_ATTACHMENT_ITEM_IDS=${DOCUMENSO_OTD_ATTACHMENT_ITEM_IDS}
      - DOCUMENSO_OTD_ATTACHMENT_URLS=${DOCUMENSO_OTD_ATTACHMENT_URLS}
      - DOCUMENSO_OTD_AANKOOP_ATTACHMENT_ITEM_IDS=${DOCUMENSO_OTD_AANKOOP_ATTACHMENT_ITEM_IDS}
    restart: unless-stopped
    networks:
      - devree-network

networks:
  devree-network:
    driver: bridge
